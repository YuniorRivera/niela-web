<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #0A0E14; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 40px; font-family: -apple-system, sans-serif; }
  .row { display: flex; gap: 24px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .label { color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 1px; text-align: center; margin-top: 8px; }
  h3 { color: #D4A857; font-size: 11px; letter-spacing: 2px; font-weight: 500; text-align: center; margin: 0; }
  .divider { width: 100%; max-width: 600px; height: 0.5px; background: rgba(255,255,255,0.07); }
</style>
</head>
<body>

<h3>NIELA — LA GOTA</h3>

<!-- TAMAÑO GRANDE -->
<div class="row">

  <!-- Versión 1: Fondo oscuro principal -->
  <div style="display:flex;flex-direction:column;align-items:center">
    <div style="width:180px;height:180px;background:#121212;border-radius:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 60px rgba(212,168,87,0.15);">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="1.8" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="dropGrad" cx="50%" cy="40%" r="50%">
            <stop offset="0%" style="stop-color:#F5D882"/>
            <stop offset="60%" style="stop-color:#D4A857"/>
            <stop offset="100%" style="stop-color:#B8893B"/>
          </radialGradient>
        </defs>

        <!-- Ondas concéntricas (de más exterior a más interior) -->
        <ellipse cx="60" cy="78" rx="46" ry="6" stroke="#D4A857" stroke-width="1.2" fill="none" opacity="0.25"/>
        <ellipse cx="60" cy="78" rx="36" ry="5" stroke="#D4A857" stroke-width="1.4" fill="none" opacity="0.4"/>
        <ellipse cx="60" cy="78" rx="26" ry="4" stroke="#D4A857" stroke-width="1.6" fill="none" opacity="0.6"/>
        <ellipse cx="60" cy="78" rx="16" ry="3" stroke="#D4A857" stroke-width="1.8" fill="none" opacity="0.8"/>

        <!-- La gota (forma orgánica Sumi-e) -->
        <path d="M60 18 
                 C60 18 50 35 47 50
                 C45 60 50 70 60 70
                 C70 70 75 60 73 50
                 C70 35 60 18 60 18 Z"
              fill="url(#dropGrad)" filter="url(#glow1)"/>

        <!-- Reflejo sutil en la gota -->
        <ellipse cx="55" cy="42" rx="3" ry="6" fill="#FFFFFF" opacity="0.25"/>

      </svg>
    </div>
    <span class="label">Principal · 180px</span>
  </div>

  <!-- Versión 2: Con gradiente cálido de fondo -->
  <div style="display:flex;flex-direction:column;align-items:center">
    <div style="width:180px;height:180px;background:linear-gradient(145deg,#1C1408,#121212,#0A0E14);border-radius:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 60px rgba(212,168,87,0.2);">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
        <defs>
          <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="dropGrad2" cx="50%" cy="40%" r="50%">
            <stop offset="0%" style="stop-color:#F5D882"/>
            <stop offset="60%" style="stop-color:#D4A857"/>
            <stop offset="100%" style="stop-color:#B8893B"/>
          </radialGradient>
        </defs>
        <ellipse cx="60" cy="78" rx="46" ry="6" stroke="#D4A857" stroke-width="1.2" fill="none" opacity="0.3"/>
        <ellipse cx="60" cy="78" rx="36" ry="5" stroke="#D4A857" stroke-width="1.4" fill="none" opacity="0.45"/>
        <ellipse cx="60" cy="78" rx="26" ry="4" stroke="#D4A857" stroke-width="1.6" fill="none" opacity="0.65"/>
        <ellipse cx="60" cy="78" rx="16" ry="3" stroke="#D4A857" stroke-width="1.8" fill="none" opacity="0.85"/>
        <path d="M60 18 C60 18 50 35 47 50 C45 60 50 70 60 70 C70 70 75 60 73 50 C70 35 60 18 60 18 Z"
              fill="url(#dropGrad2)" filter="url(#glow2)"/>
        <ellipse cx="55" cy="42" rx="3" ry="6" fill="#FFFFFF" opacity="0.3"/>
      </svg>
    </div>
    <span class="label">Gradiente cálido · 180px</span>
  </div>

  <!-- Versión 3: Fondo crema (Sumi-e auténtico) -->
  <div style="display:flex;flex-direction:column;align-items:center">
    <div style="width:180px;height:180px;background:#F0E8D0;border-radius:40px;display:flex;align-items:center;justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
        <!-- Ondas en tinta sumi-e -->
        <ellipse cx="60" cy="78" rx="46" ry="6" stroke="#1A0F00" stroke-width="1.2" fill="none" opacity="0.2"/>
        <ellipse cx="60" cy="78" rx="36" ry="5" stroke="#1A0F00" stroke-width="1.4" fill="none" opacity="0.35"/>
        <ellipse cx="60" cy="78" rx="26" ry="4" stroke="#1A0F00" stroke-width="1.6" fill="none" opacity="0.55"/>
        <ellipse cx="60" cy="78" rx="16" ry="3" stroke="#1A0F00" stroke-width="1.8" fill="none" opacity="0.75"/>
        <!-- Gota en tinta -->
        <path d="M60 18 C60 18 50 35 47 50 C45 60 50 70 60 70 C70 70 75 60 73 50 C70 35 60 18 60 18 Z"
              fill="#1A0F00"/>
        <ellipse cx="55" cy="42" rx="3" ry="6" fill="#FFFFFF" opacity="0.4"/>
      </svg>
    </div>
    <span class="label">Sumi-e auténtico</span>
  </div>

</div>

<div class="divider"></div>

<!-- TAMAÑOS REALES -->
<h3>CÓMO SE VE EN LA APP</h3>

<div class="row">

  <!-- App icon iOS/Android style -->
  <div style="display:flex;flex-direction:column;align-items:center">
    <div style="width:80px;height:80px;background:#121212;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(212,168,87,0.1);">
      <svg width="60" height="60" viewBox="0 0 120 120" fill="none">
        <ellipse cx="60" cy="78" rx="46" ry="6" stroke="#D4A857" stroke-width="1.2" fill="none" opacity="0.25"/>
        <ellipse cx="60" cy="78" rx="36" ry="5" stroke="#D4A857" stroke-width="1.4" fill="none" opacity="0.4"/>
        <ellipse cx="60" cy="78" rx="26" ry="4" stroke="#D4A857" stroke-width="1.6" fill="none" opacity="0.6"/>
        <ellipse cx="60" cy="78" rx="16" ry="3" stroke="#D4A857" stroke-width="1.8" fill="none" opacity="0.8"/>
        <path d="M60 18 C60 18 50 35 47 50 C45 60 50 70 60 70 C70 70 75 60 73 50 C70 35 60 18 60 18 Z" fill="#D4A857"/>
      </svg>
    </div>
    <span class="label">80px · tab bar</span>
  </div>

  <!-- Pantalla auth completa -->
  <div style="display:flex;flex-direction:column;align-items:center">
    <div style="width:200px;height:340px;background:#0A0E14;border-radius:32px;border:0.5px solid rgba(212,168,87,0.15);padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;">
      <svg width="76" height="76" viewBox="0 0 120 120" fill="none" style="margin-top:30px">
        <ellipse cx="60" cy="78" rx="46" ry="6" stroke="#D4A857" stroke-width="1.2" fill="none" opacity="0.25"/>
        <ellipse cx="60" cy="78" rx="36" ry="5" stroke="#D4A857" stroke-width="1.4" fill="none" opacity="0.4"/>
        <ellipse cx="60" cy="78" rx="26" ry="4" stroke="#D4A857" stroke-width="1.6" fill="none" opacity="0.6"/>
        <ellipse cx="60" cy="78" rx="16" ry="3" stroke="#D4A857" stroke-width="1.8" fill="none" opacity="0.8"/>
        <path d="M60 18 C60 18 50 35 47 50 C45 60 50 70 60 70 C70 70 75 60 73 50 C70 35 60 18 60 18 Z" fill="#D4A857"/>
      </svg>
      <div style="color:#FFFFFF;font-size:16px;font-weight:500;margin-top:18px;">Hola, Yunior</div>
      <div style="color:rgba(255,255,255,0.5);font-size:11px;">Creá tu cuenta</div>
    </div>
    <span class="label">Pantalla auth real</span>
  </div>

  <!-- Logo + texto navbar -->
  <div style="display:flex;flex-direction:column;align-items:center">
    <div style="display:flex;align-items:center;gap:10px;background:#121212;padding:14px 22px;border-radius:16px;border:0.5px solid rgba(212,168,87,0.2);">
      <svg width="26" height="26" viewBox="0 0 120 120" fill="none">
        <ellipse cx="60" cy="78" rx="46" ry="6" stroke="#D4A857" stroke-width="1.6" fill="none" opacity="0.3"/>
        <ellipse cx="60" cy="78" rx="36" ry="5" stroke="#D4A857" stroke-width="1.8" fill="none" opacity="0.5"/>
        <ellipse cx="60" cy="78" rx="26" ry="4" stroke="#D4A857" stroke-width="2" fill="none" opacity="0.7"/>
        <ellipse cx="60" cy="78" rx="16" ry="3" stroke="#D4A857" stroke-width="2.2" fill="none" opacity="0.9"/>
        <path d="M60 18 C60 18 50 35 47 50 C45 60 50 70 60 70 C70 70 75 60 73 50 C70 35 60 18 60 18 Z" fill="#D4A857"/>
      </svg>
      <span style="color:#FFFFFF;font-size:19px;font-weight:300;letter-spacing:3px;font-family:Georgia,serif;">niela</span>
    </div>
    <span class="label">Logo + texto navbar web</span>
  </div>

</div>

</body>
</html>
